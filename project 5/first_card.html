<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Card</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            width: 100%;
            height: 100%;
            min-height: 900px;
               background-image: linear-gradient(90deg, rgb(39, 61, 81) 0%, rgb(33, 73, 115) 16.667%, rgb(34, 96, 152) 33.333%, rgb(43, 126, 184) 50%, rgb(57, 157, 205) 66.667%, rgb(73, 184, 209) 83.333%, rgb(89, 201, 196) 100%);
            display: flex;
            justify-content: center;
            align-items: center;

        }
        .card{
            width: 360px;
            height: 550px;
            background-color: white;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            padding: 20px;
        }
        .card img{
            height:50%;
            width: 90%;
            border-radius: 10px;
        }
        .card h2{
            font-weight: bold;
            font-size: 1.6rem;
        }
        .card p{
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <img src="fakeqr.png" alt="">
            <h2>
                Improve your frontend skills by developing projects 
            </h2>
            <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Praesentium facilis totam, modi a mollitia cumque assumenda quia quisquam.</p>

        </div>
    </div>
</body>
</html>
